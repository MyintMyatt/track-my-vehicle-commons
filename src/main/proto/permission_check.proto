syntax = "proto3";

option java_multiple_files = true;
option java_package = "dev.orion.grpc.auth.client";
option java_outer_classname = "PermissionCheckProto";

message PermissionCheckRequest{
  string username = 1;
  string resource = 2;
  Action action = 3;
}

enum Action {
  request = 0;
  create = 1;
  approve = 2;
  reject = 3;
  edit = 4;
  view = 5;
  export = 6; // report export
  delete = 7;
}

message PermissionCheckResponse{
  bool isGranted = 1;
  string message = 2;
}

service PermissionCheckService {
  rpc checkPermission(PermissionCheckRequest) returns (PermissionCheckResponse);
}