syntax= "proto3";

option java_multiple_files= true;
option java_package = "dev.orion.grpc.notification";
option java_outer_classname = "CommonNotificationClass";

message OtpNotificationRequest{
  string email = 1;
  string otp = 2;
}

message NotificationCommonResponse{
  int32 statusCode = 1;
  bool success = 2;
  string message = 3;
}

service OtpGrpcService{
  rpc sendOtp(OtpNotificationRequest) returns (NotificationCommonResponse);
}